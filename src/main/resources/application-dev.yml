spring:
  config:
    activate:
      on-profile: dev
    import:
      - optional:file:.env[.properties]

  docker:
    compose:
      lifecycle-management: start_only

  jackson:
    time-zone: Asia/Seoul

  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: jdbc:mysql://localhost:3306/raillo
    username: sa
    password: secret
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        order_inserts: true
        format_sql: true
        jdbc:
          batch_size: 500

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

cors:
  allowed-origins: http://localhost:3000
  allowed-methods: GET, POST, PUT, DELETE
  allowed-headers: Access-Control-Allow-Origin, Content-type, Access-Control-Allow-Headers, Authorization, X-Requested-With

jwt:
  secret: ${JWT_KEY}

cookie:
  domain: localhost

payment:
  toss:
    api:
      base-url: https://api.tosspayments.com
      client-key: ${TOSS_CLIENT_KEY}
      secret-key: ${TOSS_SECRET_KEY}
      version: v1

# Prometheus
management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, metrics
  metrics:
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
    tags:
      application: raillo-backend
  endpoint:
    prometheus:
      access: unrestricted

# redis TTL
redis:
  ttl:
    pending-booking: 10m
    pending-booking-member-key: 580s
