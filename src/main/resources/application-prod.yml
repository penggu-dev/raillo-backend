spring:
  config:
    activate:
      on-profile: prod
    import:
      - optional:file:.env[.properties]

  jackson:
    time-zone: Asia/Seoul

  data:
    redis:
      host: redis-service   # k8s의 redis 서비스명
      port: 6379            # redis port

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PW}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        order_inserts: true
        format_sql: false
        jdbc:
          batch_size: 500

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

cors:
  allowed-origins: https://www.raillo.shop
  allowed-methods: GET, POST, PUT, DELETE
  allowed-headers: Access-Control-Allow-Origin, Content-type, Access-Control-Allow-Headers, Authorization, X-Requested-With

jwt:
  secret: ${JWT_KEY}

cookie:
  domain: .raillo.shop

booking:
  expiration:
    reservation: 10

# Prometheus
management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, metrics
  metrics:
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
    tags:
      application: raillo-backend
  endpoint:
    prometheus:
      access: unrestricted
