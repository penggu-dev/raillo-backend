<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>결제 성공</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card {
            background: #ffffff;
            width: 420px;
            padding: 32px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        h2 {
            margin: 0 0 24px;
            color: #222;
        }

        .info {
            text-align: left;
            background: #f9fafb;
            padding: 16px;
            border-radius: 10px;
            font-size: 14px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #555;
        }

        .row:last-child {
            margin-bottom: 0;
        }

        .label {
            font-weight: 500;
        }

        .value {
            font-family: monospace;
            color: #222;
        }

        .amount {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #2563eb;
        }

        .hint {
            margin-top: 16px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">✅</div>
    <h2>결제가 완료되었습니다</h2>

    <div class="info">
        <div class="row">
            <span class="label">paymentKey</span>
            <span class="value" th:text="${paymentKey}"></span>
        </div>
        <div class="row">
            <span class="label">orderId</span>
            <span class="value" th:text="${orderId}"></span>
        </div>
        <div class="row">
            <span class="label">amount</span>
            <span class="value" th:text="${amount} + '원'"></span>
        </div>
    </div>

    <div class="amount">
        결제 금액: <span th:text="${amount} + '원'"></span>
    </div>

    <div class="hint">
        ※ 테스트 결제 화면입니다
    </div>
</div>

</body>
</html>
