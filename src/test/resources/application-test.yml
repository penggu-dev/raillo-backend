spring:
  config.activate.on-profile: "test"
  data:
    redis:
      host: localhost
      port: 63790
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:test;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        highlight_sql: true
    open-in-view: false

  mail:
    host: smtp.test.com
    port: 62525
    username: dummy
    password: dummy
    test-connection: false # 테스트 시 메일 연결 확인 비활성화

logging:
  level:
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
    org.springframework.jdbc.core: INFO
    io.lettuce.core: WARN

train:
  schedule:
    excel:
      filename: "train_schedule.xlsx"
  station-fare:
    excel:
      filename: "station_fare.xls"
  standing:
    ratio: 0.15

jwt:
  secret: "crailotestjwtsecretkey2025fordevelopmentandtestingonly"

cors:
  allowed-origins: http://localhost:3000
  allowed-methods: GET, POST, PUT, DELETE
  allowed-headers: Access-Control-Allow-Origin, Content-type, Access-Control-Allow-Headers, Authorization, X-Requested-With

booking:
  expiration:
    reservation: 1
