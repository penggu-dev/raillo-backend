spring:
  config.activate.on-profile: "test"
  data:
    redis:
      host: localhost
      port: 63790
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:test;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        highlight_sql: true
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.jdbc.core: DEBUG

train:
  schedule:
    excel:
      filename: "train_schedule.xlsx"
  station-fare:
    excel:
      filename: "station_fare.xls"
  standing:
    ratio: 0.15

jwt:
  # railo-test-jwt-secret-key-2024-for-development-and-testing-only
  secret: "cmFpbG8tdGVzdC1qd3Qtc2VjcmV0LWtleS0yMDI0LWZvci1kZXZlbG9wbWVudC1hbmQtdGVzdGluZy1vbmx5"
