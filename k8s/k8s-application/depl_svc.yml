apiVersion: apps/v1
kind: Deployment
metadata:
  name: raillo-backend
  namespace: raillo
spec:
  # Deployment나 StatefulSet이 유지할 "옛날 ReplicaSet"의 수를 제한하는 옵션. 자원공간의 낭비 방지 및 관리의 편의성.
  revisionHistoryLimit: 2
  replicas: 2
  selector:
    matchLabels:
      app: raillo-backend
  template:
    metadata:
      labels:
        app: raillo-backend
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: raillo-backend
      containers:
        - name: raillo-backend
          image: 052104148083.dkr.ecr.ap-northeast-2.amazonaws.com/raillo-backend:latest
          ports:
            - containerPort: 8080  # spring의 포트번호와 일치
          resources:
            # 컨테이너가 사용할수 있는 리소스의 최대치
            limits:
              cpu: "1"
              memory: "1Gi"
            # 컨테이너가 시작될떄 보장받아야 하는 최소 자원
            requests:
              cpu: "0.5"
              memory: "512Mi"
          envFrom:
          - secretRef:
              name: raillo-secrets
          # 컨테이너 상태 확인을 통해 롤링업데이트 최적화
          readinessProbe:
            httpGet:
              # healthcheck 경로
              path: /health
              port: 8080
            # 컨테이너 시작 후 지연
            initialDelaySeconds: 10
            # 확인 반복 주기
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: raillo-backend-service
  namespace: raillo
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: raillo-backend
